<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="onCancel()">{{data.cancelBtnText}}</button>
  <button mat-button (click)="onConfirm()">{{data.confirmBtnText}}</button>
</mat-dialog-actions>
