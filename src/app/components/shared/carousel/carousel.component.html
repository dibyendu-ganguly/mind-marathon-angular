<div id="default-carousel" class="relative w-full h-full">
    <!-- Carousel wrapper -->
    <div class="relative h-full overflow-hidden rounded-lg">
         <!-- Items -->
          <!-- {{items() | json}} -->
      @for (item of items(); track $index) {
        @if(item.kind === 'text' && currentItemIndex === $index){
          <div class="h-full flex flex-col justify-between max-w-sm mx-auto text-center px-6">
              <h5 class="mb-2 text-2xl font-bold tracking-tight text-gray-900 dark:text-white">{{item.header}}</h5>
              <p class="mb-3 font-normal text-gray-700 dark:text-gray-400 flex items-center min-h-36">{{item.description}}</p>
              
              <button class="inline-flex items-center justify-center px-3 py-2 mb-2 text-sm font-medium text-center text-white bg-blue-700 rounded-lg hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800"
              [matMenuTriggerFor]="menu">
                  Read more
                  <svg class="rtl:rotate-180 w-3.5 h-3.5 ms-2" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 10">
                      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 5h12m0 0L9 1m4 4L9 9"/>
                  </svg>
              </button>
          </div>

          <mat-menu #menu="matMenu" xPosition="after" yPosition="above">
            @for (item of item.menuItems; track $index) {
              <a mat-menu-item [href]="item.link" class="{{ iconClass }} hover:underline" target="_blank">
                <span>
                  {{ item.text }}
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-up-right inline-block" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5"/>
                    <path fill-rule="evenodd" d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0z"/>
                  </svg>
                  
                </span>
              </a>
            }
          </mat-menu>
        }
        

        <!-- <div class="duration-700 ease-in-out" [class.hidden]="currentItemIndex !== $index" data-carousel-item>
            <img src="{{ item.image }}" class="absolute block w-full -translate-x-1/2 -translate-y-1/2 top-1/2 left-1/2" alt="{{ item.alt }}">
        </div> -->
      }
        
      <!-- Slider indicators -->
      @if(
      items().length > 1 && items().length < 6
      ){
        <div class="mx-auto text-center py-4  space-x-3 rtl:space-x-reverse">
          @for (item of items(); track $index) {
            <button type="button" class="w-3 h-3 rounded-full bg-primary" aria-current="true" (click)="setCurrentItem($index)"></button>
          }
        </div>
      }

    </div>
    
    <!-- Slider controls -->
    <button type="button" class="absolute top-0 start-0 z-30 flex items-center justify-center h-full px-0 cursor-pointer group focus:outline-none" (click)="setCurrentItem(currentItemIndex === 0 ? items().length - 1 : currentItemIndex - 1)">
        <span class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-white/30 dark:bg-gray-800/30 group-hover:bg-white/50 dark:group-hover:bg-gray-800/60 group-focus:ring-4 group-focus:ring-white dark:group-focus:ring-gray-800/70 group-focus:outline-none">
            <svg class="w-4 h-4 text-white dark:text-gray-800 rtl:rotate-180" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 1 1 5l4 4"/>
            </svg>
            <span class="sr-only">Previous</span>
        </span>
    </button>
    <button type="button" class="absolute top-0 end-0 z-30 flex items-center justify-center h-full px-0 cursor-pointer group focus:outline-none" (click)="setCurrentItem((currentItemIndex + 1) % items().length)">
        <span class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-white/30 dark:bg-gray-800/30 group-hover:bg-white/50 dark:group-hover:bg-gray-800/60 group-focus:ring-4 group-focus:ring-white dark:group-focus:ring-gray-800/70 group-focus:outline-none">
            <svg class="w-4 h-4 text-white dark:text-gray-800 rtl:rotate-180" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 9 4-4-4-4"/>
            </svg>
            <span class="sr-only">Next</span>
        </span>
    </button>
</div>
