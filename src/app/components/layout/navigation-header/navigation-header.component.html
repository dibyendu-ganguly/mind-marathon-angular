        <path d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2z"/>

    </a>
    <div class="flex lg:order-2 space-x-3 rtl:space-x-reverse items-center">

        <!--Search-->

          </svg>
          <span class="sr-only">Search</span>
        </button>


        <!-- theme-toggle -->
        <app-theme-toggle class="hidden md:block"></app-theme-toggle>

          <app-user-dropdown-menu class="divide-y divide-gray-100" ></app-user-dropdown-menu>
        </div>

        <!--Hamburger Menu-->
        <button  data-collapse-toggle="navbar-sticky" type="button" class="group inline-flex w-12 h-12 lg:hidden text-slate-800 bg-white text-center items-center justify-center rounded shadow-[0_1px_0_theme(colors.slate.950/.04),0_1px_2px_theme(colors.slate.950/.12),inset_0_-2px_0_theme(colors.slate.950/.04)] hover:shadow-[0_1px_0_theme(colors.slate.950/.04),0_4px_8px_theme(colors.slate.950/.12),inset_0_-2px_0_theme(colors.slate.950/.04)] transition fill-on-background" aria-pressed="false"
          onclick="this.setAttribute('aria-pressed', !(this.getAttribute('aria-pressed') === 'true'))">
          <span class="sr-only">Menu</span>
          <svg class="w-6 h-6 fill-current pointer-events-none" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
              <rect class="origin-center -translate-y-[5px] transition-all duration-300 ease-[cubic-bezier(.5,.85,.25,1.1)] group-[[aria-pressed=true]]:translate-x-0 group-[[aria-pressed=true]]:translate-y-0 group-[[aria-pressed=true]]:rotate-[315deg]" y="7" width="16" height="2" rx="1"></rect>
              <rect class="origin-center transition-all duration-300 ease-[cubic-bezier(.5,.85,.25,1.8)] group-[[aria-pressed=true]]:rotate-45" y="7" width="16" height="2" rx="1"></rect>
              <rect class="origin-center translate-y-[5px] transition-all duration-300 ease-[cubic-bezier(.5,.85,.25,1.1)] group-[[aria-pressed=true]]:translate-y-0 group-[[aria-pressed=true]]:rotate-[135deg]" y="7" width="16" height="2" rx="1"></rect>

          <span class="sr-only">Open main menu</span>
          <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 17 14">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 1h15M1 7h15M1 13h15"/>
          </svg>
        </button> -->


    </div>




    <!--Main Menu Dropdown-->
    <!-- @togglingState -->
    <div  class="items-center justify-between hidden w-full lg:flex lg:w-auto lg:order-1 divide-y divide-gray-100  dark:divide-gray-600 lg:divide-y-0" id="navbar-sticky">
      <div class="px-4 py-3 md:hidden">
        <ng-container *ngTemplateOutlet="navbarsearch"></ng-container>
      </div>
      <ul class="flex flex-col p-4 lg:p-0 mt-4 font-medium border-0 rounded-lg bg-gray-50 lg:space-x-8 rtl:space-x-reverse lg:flex-row lg:mt-0 lg:border-0 lg:bg-white dark:bg-gray-800 lg:dark:bg-gray-900 dark:border-gray-700">
        <li>
          <a [routerLink]="['/quiz']" routerLinkActive="router-link-active" class="block py-2 px-3 text-white bg-blue-700 rounded-sm lg:bg-transparent lg:text-blue-700 lg:p-0 md:dark:text-blue-500" aria-current="page">Quiz</a>
        </li>
        <li>
          <a [routerLink]="['/test']" routerLinkActive="router-link-active"  class="block py-2 px-3 text-gray-900 rounded-sm hover:bg-gray-100 lg:hover:bg-transparent lg:hover:text-blue-700 lg:p-0 lg:dark:hover:text-blue-500 dark:text-white dark:hover:bg-gray-700 dark:hover:text-white lg:dark:hover:bg-transparent dark:border-gray-700">Test</a>
        </li>
        <li>
          <a href="#" class="block py-2 px-3 text-gray-900 rounded-sm hover:bg-gray-100 lg:hover:bg-transparent lg:hover:text-blue-700 lg:p-0 lg:dark:hover:text-blue-500 dark:text-white dark:hover:bg-gray-700 dark:hover:text-white lg:dark:hover:bg-transparent dark:border-gray-700">Services</a>

        <li>

        </li>
      </ul>

      <div class="flex md:hidden pt-4 space-x-4 items-center justify-between">
        <app-theme-toggle></app-theme-toggle>
        <app-contrast-change mode="text"></app-contrast-change>
        <app-language-selector></app-language-selector>
      </div>

    </div>
    <div class="items-center justify-between hidden w-full lg:order-3" id="navbar-search">
      <ng-container *ngTemplateOutlet="navbarsearch"></ng-container>

  <mat-progress-bar [mode]="mode()" value="100"></mat-progress-bar>

<ng-template #navbarsearch>
  <!--Navbar Search-->
  <div class="relative mt-3">
    <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
      <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/>
      </svg>
    </div>
    <input type="text" id="search-navbar" class="block w-full p-2 ps-10 text-sm text-gray-900 border border-gray-300 rounded-lg bg-gray-50 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Search...">

</ng-template>
